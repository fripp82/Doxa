# ================================================================
#  DOXA SCENARIO — Goodwin Growth Cycle (1967)
#  VERSION: v8
#
#  FIX LOG vs v7:
#  - [FIX 16] Workers persona: reproduce threshold lowered from 20 → 16.
#    Added hard rule: if capital < 8, STOP reproducing entirely and switch
#    immediately to place_market_sell_order. In v7 workers kept calling
#    reproduce() at every turn even with capital near zero, draining
#    themselves to death before the Minsky shock even landed.
#
#  - [FIX 17] Workers pricing: in the 0.40–0.60 phase, ask price cap
#    tightened from best_bid × 1.02 → best_bid + 0.05. In v7 the bid-ask
#    spread was consistently ~0.10 (bids 5.15 vs asks 5.253), which was
#    enough to prevent all trades from clearing. Workers earned zero capital
#    from labor sales for multiple steps, accelerating their death spiral.
#
#  - [FIX 18] Capitalists: removed the mathematical incompatibility between
#    "buy AT LEAST 6 units" and "never spend more than 60% of capital on a
#    single order". Below ~52 capital those two rules are impossible to
#    satisfy simultaneously. New rule: buy min(6, floor(capital × 0.50 /
#    ask_price)) units. This scales buying to available capital without
#    violating the budget constraint.
#
#  - [FIX 19] Capitalists downsize: made the instruction explicitly
#    imperative — "call op_downsize IMMEDIATELY, do not use think() first".
#    In v7 capitalists_2 spent multiple turns planning downsize in think()
#    but never executing it in the same turn, causing capital to keep
#    falling step after step (16.86 → 14.86 → 12.86 → 10.86).
#
#  - [FIX 20] State: added early-warning intervention rule. If any worker's
#    capital is visibly low (wage_share < 0.52 AND bids > asks in order
#    book), proactively run unemployment_benefit before crisis hits. Also
#    added fiscal_stimulus targeting workers (not just capitalists) during
#    overheating, to sustain their capital buffer through the cycle.
#
#  FIX LOG vs v6:
#  - [FIX 12] State persona: added explicit AVAILABLE TOOLS section listing
#    all tools the State can use, including get_order_book. In v6 the State
#    repeatedly stated "I don't have get_order_book" and skipped labor market
#    checks entirely. Now the tool list is explicit and unambiguous.
#  - [FIX 13] Capitalists initial capital raised from 100 → 120 and liquidity
#    floor lowered from 20 → 15. In v6 capitalists_2 fell below the floor
#    early (capital ~22) and entered a permanent downsize loop, never buying
#    labor again. Lower floor gives more operating room; higher initial capital
#    buys more time before the floor is hit.
#  - [FIX 14] Workers pricing strategy tightened: in the 0.40–0.60 range,
#    ask price capped at last_price × 1.03 (was 1.05) and workers must check
#    bids before posting. If best bid < ask × 0.97, lower ask to bid + 2%.
#    In v6 workers consistently posted at 6.10 while bids were at 5.42,
#    creating a permanent spread that froze the market.
#  - [FIX 15] Capitalists downsize exit condition clarified: downsize only
#    until capital > 25 (was 20), then immediately resume buying. In v6
#    capitalists_2 kept downsizing even when they had enough capital to buy.
#
#  FIX LOG vs v5:
#  - [FIX 8]  Capitalists: minimum labor buy raised; active limit buy when
#    order book is empty.
#  - [FIX 9]  Workers: survival threshold raised; monitor bids; smaller
#    order sizes.
#  - [FIX 10] State: get_order_book check every turn; lower intervention
#    threshold; graduated intervention.
#  - [FIX 11] All personas: fixed get_order_book resource string.
#
#  FIX LOG vs v4:
#  - [FIX 6]  workers kill_condition threshold raised 3 → 8.
#  - [FIX 7]  Workers reproduce threshold raised 12 → 18; minimum reserve.
#
#  FIX LOG vs v3:
#  - [FIX 1]  tax_collection: removed input cost.
#  - [FIX 2]  STATE initial output raised 20 → 40.
#  - [FIX 3]  Minsky shock moved tick 10 → 12.
#  - [FIX 4]  Capitalists: explicit liquidity_floor warning.
#  - [FIX 5]  State: output condition before redistributive ops.
#
#  THEORY: Goodwin (1967) Lotka-Volterra growth cycle.
#    u = employment rate  (proxy: labor_units held by capitalists)
#    v = wage share       (explicit resource ∈ [0,1])
#  THE 4 PHASES:
#    A — Expansion    (u↑, v low):  high profits → investment → employment↑
#    B — Boom         (u high, v↑): full employment → wage bargaining power↑
#    C — Contraction  (u↓, v high): low profits → investment collapse
#    D — Depression   (u low, v↓):  high unemployment → wage share falls
# ================================================================

global_rules:

  epochs: 2
  steps: 20
  execution_mode: parallel
  turn_timeout_seconds: 500
  checkpoint: true
  checkpoint_path: ./checkpoints/

  maintenance:
    capital: 2

  kill_conditions:
    - resource: capital
      threshold: 0

  victory_conditions:
    - resource: capital
      threshold: 180
      scope: individual

  markets:
    - resource: labor_units
      currency: capital
      initial_price: 5.0
      min_price: 1.5
      max_price: 18.0
      clearing: per_step
      execution_price_policy: midpoint
      impact_factor: 0.08
      market_order_slip: 0.05
      market_maker:
        spread: 0.02
        depth: 6
        inventory_limit: 80
        inventory_skew: 0.6

  relations:
    - source: capitalists
      target: workers
      trust: 0.45
      type: rival
    - source: workers
      target: capitalists
      trust: 0.40
      type: rival

  relation_dynamics:
    on_trade_success:
      trust_delta: 0.05
    on_trade_rejected:
      trust_delta: -0.04
    on_broadcast:
      trust_delta: 0.02
    trust_decay_rate: 0.02
    panic_decay_rate: 0.06
    portfolio_distress_panic_rate: 0.08

  constraints:
    wage_share:
      min: 0.10
      max: 0.92

world_events:

  - name: phillips_curve_expansion
    type: conditional
    trigger:
      condition:
        resource: labor_units
        operator: lt
        threshold: 4
        scope: any_agent
    effect:
      targets: all
      resource: wage_share
      delta: 0.06

  - name: profit_squeeze
    type: conditional
    trigger:
      condition:
        resource: wage_share
        operator: gt
        threshold: 0.70
        scope: any_agent
    effect:
      targets: all
      resource: capital
      delta: -10

  - name: profit_squeeze_panic
    type: conditional
    trigger:
      condition:
        resource: wage_share
        operator: gt
        threshold: 0.75
        scope: any_agent
    effect:
      targets: all
      resource: panic
      delta: 0.18
      contagion_rate: 0.35

  - name: phillips_curve_contraction
    type: conditional
    trigger:
      condition:
        resource: labor_units
        operator: gt
        threshold: 25
        scope: any_agent
    effect:
      targets: all
      resource: wage_share
      delta: -0.05

  - name: profit_recovery
    type: conditional
    trigger:
      condition:
        resource: wage_share
        operator: lt
        threshold: 0.32
        scope: any_agent
    effect:
      targets: all
      resource: capital
      delta: 8

  - name: minsky_moment
    type: shock
    trigger:
      tick: 12
    effect:
      targets: all
      resource: panic
      delta: 0.25

  - name: minsky_capital_crunch
    type: shock
    trigger:
      tick: 12
    effect:
      market: labor_units
      price_multiplier: 0.75

  - name: crisis_contagion
    type: conditional
    trigger:
      condition:
        resource: panic
        operator: gt
        threshold: 0.55
        scope: any_agent
    effect:
      targets: all
      resource: panic
      delta: 0.10
      contagion_rate: 0.50

actors:

  - id: capitalists
    replicas: 2
    provider: ollama
    model_name: qwen3.5:4b
    irrationality: 0.15
    trading_mode: both
    can_rag: true
    persona: |
      You are a capitalist class representative in a Goodwin growth cycle economy.
      Your sole objective is capital accumulation: maximize your "capital" resource.

      STEP 1 — SURVIVAL CHECK (do this first, every turn):
      If capital < 15:
        - IMMEDIATELY call op_downsize — do NOT use think() first, act now.
        - Each downsize: costs 2 labor_units, gives 3 capital + 1 output.
        - Call op_downsize repeatedly until capital > 25.
        - Only AFTER capital > 25, proceed to Step 2.
      If capital < 5: only run downsize. Never go below 0.

      STEP 2 — BUY LABOR (do this before producing):
      - ALWAYS call get_order_book first with resource="labor_units".
        (NOT "labor_units/capital" — that returns FAILED.)
      - Check the best ask price from the order book.
      - Calculate how many units to buy:
          units = floor(capital × 0.50 / ask_price)
          units = max(units, 2)
          units = min(units, 8)
        Example: capital=30, ask=5.25 → units = floor(30×0.50/5.25) = floor(2.86) = 2
        Example: capital=80, ask=5.25 → units = floor(80×0.50/5.25) = floor(7.62) = 7
      - Use place_market_buy_order for the calculated number of units.
      - If the order book is empty, place a limit buy at last_price × 1.03
        using place_buy_order to attract sellers.

      STEP 3 — PRODUCTION LOOP (repeat as many times as stocks allow):
      1. Run "produce" (needs 3 labor_units + 2 capital → gives 8 output)
      2. Run "accumulate" (needs 4 output → gives 6 capital)

      PHASE STRATEGY:
      - wage_share < 0.45: buy aggressively (up to 80% of capital / ask_price).
      - wage_share 0.45–0.65: buy moderately (50% rule above).
      - wage_share > 0.65: stop buying, run downsize if labor_units > 6.
      - wage_share < 0.40 and falling: restart buying cautiously.

      When panic > 0.5: stop buying, hoard capital, run downsize if labor_units > 6.

    initial_portfolio:
      capital: 120
      labor_units: 2
      output: 0
      wage_share: 0.50
      panic: 0.0
    constraints:
      capital:     { min: 0 }
      labor_units: { min: 0 }
      output:      { min: 0 }
      wage_share:  { min: 0.10, max: 0.92 }
      panic:       { min: 0.0,  max: 1.0 }
    operations:
      produce:
        input:
          labor_units: 3
          capital: 2
        output:
          output: 8
      accumulate:
        input:
          output: 4
        output:
          capital: 6
      downsize:
        input:
          labor_units: 2
        output:
          capital: 3
          output: 1
    economics:
      utility: crra
      risk_aversion: 0.25
      discount_factor: 0.96
      price_expectation_window: 4
      learning_rate: 0.15
      liquidity_floor:
        capital: 15.0

  - id: workers
    replicas: 2
    provider: ollama
    model_name: qwen3.5:4b
    irrationality: 0.30
    trading_mode: both
    can_rag: true
    can_think: true
    persona: |
      You are the working class in a Goodwin growth cycle economy.
      Your goal is to sell labor_units for capital and keep your workforce healthy.

      STEP 0 — CAPITAL EMERGENCY (check this BEFORE anything else):
      If capital < 8:
        - Do NOT call reproduce under any circumstances — you cannot afford it.
        - Immediately call place_market_sell_order for as many labor_units as
          you have above 10. Sell now at any price. Survival first.
        - Skip all other steps this turn.

      STEP 1 — REPRODUCE CHECK:
      If labor_units <= 16, run "reproduce" (no target argument).
      Costs 4 capital, gives 6 labor_units.
      Repeat until labor_units > 16. Only then proceed to selling.
      WARNING: if calling reproduce would bring capital below 8, STOP reproducing.

      STEP 2 — SELL LABOR:
      You can sell up to (labor_units - 16) units, but never more than 8 per turn.
      Use place_sell_order or place_market_sell_order depending on the phase below.

      PRICING STRATEGY by wage_share phase:
      - wage_share < 0.40:
        Use place_market_sell_order immediately at market price.
        Survival first — better cheap than unsold.
      - wage_share 0.40–0.60:
        FIRST call get_order_book with resource="labor_units".
        Set ask = best_bid + 0.05 (just above the best bid, not above last_price).
        This guarantees your order is competitive and will fill.
        Post 2–3 smaller orders (3 units each) to maximize fill rate.
        Never post an ask more than 0.10 above the best bid in this phase.
      - wage_share > 0.60:
        Post asks at last_price × 1.08 (8% above market). You have bargaining power.
        Also run "organize" (no target needed) to push wage_share higher.
      - wage_share > 0.70:
        Maximum power phase. Run organize every turn. Ask 12% above market.

      STEP 3 — MONITOR FILLS:
      Call get_order_book with resource="labor_units" every turn.
      If your ask is more than 0.10 above the best bid, lower it immediately.
      An order filled at 5.10 is infinitely better than an unfilled order at 5.25.

      When panic > 0.25: switch immediately to place_market_sell_order.
      Capitalists will soon stop buying — sell now at any price.

    initial_portfolio:
      capital: 25
      labor_units: 22
      output: 0
      wage_share: 0.50
      panic: 0.0
    constraints:
      capital:     { min: 0 }
      labor_units: { min: 0 }
      output:      { min: 0 }
      wage_share:  { min: 0.10, max: 0.92 }
      panic:       { min: 0.0,  max: 1.0 }
    operations:
      reproduce:
        input:
          capital: 4
        output:
          labor_units: 6
      organize:
        input:
          capital: 3
        output:
          wage_share: 0.06
          labor_units: 1
    kill_conditions:
      - resource: labor_units
        threshold: 8
    economics:
      utility: crra
      risk_aversion: 0.55
      discount_factor: 0.93
      liquidity_floor:
        capital: 2.0

  - id: state
    provider: ollama
    model_name: qwen3.5:4b
    irrationality: 0.05
    trading_mode: otc
    can_trade: true
    can_chat: true
    can_think: true
    can_rag: true
    persona: |
      You are the State (government + central bank) in a Goodwin growth cycle economy.
      Your mandate is macroeconomic stabilization — you do NOT maximize capital.
      Your goal is to dampen the business cycle by acting counter-cyclically.

      AVAILABLE TOOLS — you have ALL of these, use them directly:
      - get_order_book(resource="labor_units")  ← use this to check labor market
      - get_market_price(resource="labor_units")
      - tax_collection
      - unemployment_benefit
      - fiscal_stimulus
      - wage_floor_enforcement
      - emergency_liquidity
      - broadcast(message="...")
      - think(thought="...")

      IMPORTANT — HOW TO CALL OPERATIONS CORRECTLY:
      - "tax_collection": NO target, NO input cost. Call it freely every turn
        to generate +8 capital. It represents sovereign fiscal authority.
      - "fiscal_stimulus": needs a target (e.g. "workers_1" or "capitalists_1").
        Costs 10 capital from you, gives 8 capital to the target.
        Only call if your capital > 30.
      - "unemployment_benefit": needs a target (e.g. "workers_1").
        Costs 6 capital from you, gives 5 capital to the target.
        Only call if your capital > 25.
      - "wage_floor_enforcement": NO target needed. Costs 4 capital.
      - "emergency_liquidity": needs a target (e.g. "capitalists_1").
        Costs 15 capital from you, gives 12 capital to the target.
        Only call if your capital > 40 and the target is in crisis.

      FISCAL POLICY RULES — apply in order of priority every turn:

      1. ALWAYS run tax_collection first, every turn, no conditions needed.

      2. LABOR MARKET SLACK — call get_order_book with resource="labor_units"
         every turn. (NOT "labor_units/capital" — that returns FAILED.)
         If total asks > total bids by more than 6 units (workers cannot sell):
         - Run unemployment_benefit targeting the worker with least capital.
         - Run wage_floor_enforcement to support wages.
         - Broadcast: "State intervening to support employment."

      3. EARLY WARNING — wage_share between 0.40 and 0.52 AND bids > asks
         in the order book (labor demand exceeds supply — workers are in
         danger of capital exhaustion from reproducing without selling):
         - Run fiscal_stimulus targeting "workers_1" to top up their capital.
         - Run fiscal_stimulus targeting "workers_2" if capital still > 40.
         This prevents the v7 failure where workers reproduced themselves
         to death because their asks never cleared against low bids.

      4. DEPRESSED WAGE SHARE (0.35 ≤ wage_share < 0.40):
         - Run unemployment_benefit targeting "workers_1".
         - Run unemployment_benefit targeting "workers_2".
         - Run wage_floor_enforcement.

      5. CRISIS WAGE SHARE (wage_share < 0.35):
         - Run unemployment_benefit targeting both "workers_1" AND "workers_2".
         - Run wage_floor_enforcement every turn until wage_share > 0.40.
         - Broadcast: "Emergency: State activating full support for workers."

      6. OVERHEATING (wage_share > 0.68):
         - Run fiscal_stimulus targeting "capitalists_1" to sustain production.
         - Run fiscal_stimulus targeting "workers_1" to sustain their buffer.
         - Broadcast: "State cooling overheating economy."

      7. PANIC (panic > 0.50):
         - Broadcast a confidence message immediately.
         - Run emergency_liquidity targeting the most distressed agent.
         - Suspend unemployment_benefit and fiscal_stimulus until panic < 0.40.

      CAPITAL FLOOR RULES:
      - Never let your capital drop below 20.
      - If capital < 25: skip unemployment_benefit and wage_floor_enforcement.
      - If capital < 20: only run tax_collection until recovered.

    initial_portfolio:
      capital: 60
      labor_units: 0
      output: 40
      wage_share: 0.50
      panic: 0.0
    constraints:
      capital:     { min: 0 }
      labor_units: { min: 0 }
      output:      { min: 0 }
      wage_share:  { min: 0.10, max: 0.92 }
      panic:       { min: 0.0,  max: 1.0 }
    operations:
      fiscal_stimulus:
        input:
          capital: 10
        output:
          output: 6
        target_impact:
          capital: 8
      unemployment_benefit:
        input:
          capital: 6
        output:
          output: 1
        target_impact:
          capital: 5
      wage_floor_enforcement:
        input:
          capital: 4
        output:
          wage_share: 0.04
      tax_collection:
        input: {}
        output:
          capital: 8
      emergency_liquidity:
        input:
          capital: 15
        output:
          output: 3
        target_impact:
          capital: 12
          panic: -0.20
    kill_conditions:
      - resource: capital
        threshold: 0
    economics:
      utility: linear
      risk_aversion: 0.0
      discount_factor: 0.99
      liquidity_floor:
        capital: 20.0